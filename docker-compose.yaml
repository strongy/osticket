services:

  osticket:
    build:
      context: /mnt/user/appdata/osticket/build
      dockerfile: Dockerfile
    container_name: osticket
    ports:
      - "38412:80"
      - "38413:443"
    volumes:
      - /mnt/user/appdata/osticket/config:/var/www/html/include
      - /mnt/user/appdata/osticket/attachments:/var/www/html/attachments
      - /mnt/user/appdata/portainer/data/certs:/cert
    environment:
      - TZ=Europe/London
      - PUID=1000
      - PGID=65534
      - hostname=osticket
    restart: unless-stopped
    networks:
      - t2_proxy

  osticket-db:
    image: mariadb:10.11
    container_name: osticket-db
    environment:
      - TZ=Europe/London
      - MYSQL_ROOT_PASSWORD=testroot
      - MYSQL_DATABASE=osticket
      - MYSQL_USER=osticket
      - MYSQL_PASSWORD=osticket
      - PUID=1000
      - PGID=65534
      - hostname=osticket-db
    volumes:
      - osticket-db-data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - t2_proxy

  portainer:
    container_name: portainer
    hostname: portainer
    image: portainer/portainer-ce:latest
    restart: always
    ipc: private
    command: '--tlscert /data/certs/fullchain.pem --tlskey /data/certs/privkey.pem'
    ports:
      - 8000:8000/tcp
      - 9443:9443/tcp
    environment:
      - TZ=Europe/London
      - PUID=1000
      - PGID=65534
      - hostname=portainer
    volumes:
      - /home/peter/docker/portainer/data/:/data/:rw
      - /var/run/docker.sock:/var/run/docker.sock:rw
    security_opt:
      - no-new-privileges:true
    networks:
      - t2_proxy

  dozzle:
    hostname: dozzle
    container_name: dozzle
    image: amir20/dozzle:latest
    command: agent
    restart: unless-stopped
    ports:
      - 7007:7007/tcp
    environment:
      - TZ=Europe/London
      - PUID=1000
      - PGID=65534
      - hostname=dozzle
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    security_opt:
      - no-new-privileges:true
    networks:
      - t2_proxy

networks:
  t2_proxy:
    external: true

volumes:
  osticket-db-data:
